name: Release (Tag)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-tag
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build (runtime packages)
        run: npm run build

      - name: Build (UI)
        run: npm run build --workspace=@0ctx/ui

      - name: Test
        run: npm run test

      - name: Generate tarball checksums
        run: |
          mkdir -p release-artifacts
          npm pack --workspace=@0ctx/core --workspace=@0ctx/daemon --workspace=@0ctx/mcp --workspace=@0ctx/cli --pack-destination release-artifacts
          cd release-artifacts
          sha256sum *.tgz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core daemon mcp cli; do
            npm publish --workspace=@0ctx/$pkg --tag latest --access public
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*

      - name: Notify (webhook)
        if: ${{ env.RELEASE_WEBHOOK_URL != '' }}
        env:
          RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$RELEASE_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"event":"release","version":"${{ github.ref_name }}","tag":"latest","repo":"${{ github.repository }}","run_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
