name: PR Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-pr-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Validate issue linkage in title/body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";
            const combined = `${title}\n${body}`;

            const hasIssueLink = /(close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)\s*:?\s*#\d+/i.test(combined);
            if (!hasIssueLink) {
              core.setFailed("PR must include issue linkage (example: 'Closes #123' or 'Refs #123').");
            }
