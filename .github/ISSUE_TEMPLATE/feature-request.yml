name: Feature request
description: Propose an improvement or new capability.
title: "[Feature] "
labels:
  - type/feature
  - status/needs-info
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user/problem is not solved today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should we build?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else could solve this?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List testable outcomes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: In scope / out of scope boundaries.
